        body {

        nav {
            background-color: bisque;

            padding: 2px;
            margin: 5px;
            max-width: 50%;
            text-align: right;
            border-radius: 50px;
            margin: 0 auto 50px;
        }
        section {
            border: 1px solid black;

        footer {

        .container {
            margin: 100px auto;
            width: 100%;
            display: flex;
            overflow: auto;
        }
        .container::-webkit-scrollbar{
            display: none;
        }
        .grup {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1em;
            animation: spin 10s infinite linear;
            padding-right: 1em;
        }
        .card {
            flex: 0 0 150px;
            height: 150px;
            background: gray;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @keyframes spin {
            from {translate: 0;}
            to {translate: -100%;}
        }
        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
    </style>
</head>
